<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>Employee Management</title>

    <style>
      html,
      body,
      body > div,
      #container,
      #container-uiarea {
        height: 100%;
      }
    </style>

    <script
      id="sap-ui-bootstrap"
      src="https://sapui5.hana.ondemand.com/1.145.0/resources/sap-ui-core.js"
      data-sap-ui-theme="sap_horizon"
      data-sap-ui-resource-roots='{
            "com.capgemini.employeefs": "./"
        }'
      data-sap-ui-libs="sap.m, sap.ui.unified, sap.ui.layout"
      data-sap-ui-async="true"
      data-sap-ui-on-init="module:sap/ui/core/ComponentSupport"
      data-sap-ui-compat-version="edge"
      data-sap-ui-frame-options="trusted"
    ></script>

    <!-- XLSX library for Excel reading -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
  </head>

  <body class="sapUiBody sapUiSizeCompact" id="content">
    <div
      data-sap-ui-component
      data-name="com.capgemini.employeefs"
      data-id="container"
      data-settings='{"id":"com.capgemini.employeefs"}'
      data-handle-validation="true"
    ></div>
  </body>
</html>
